# .air.toml — hot reload config (https://github.com/air-verse/air)

root = "."
tmp_dir = ".air"

[build]
  # Regenerates Swagger docs and (when email-templates/src changed) the
  # compiled React Email output before every rebuild — see the script for
  # details. Keeps docs/swagger and pkg/email/dist in sync with source
  # automatically during `make dev`, no separate `make swagger` /
  # `make build-emails` needed while iterating.
  cmd = "bash scripts/dev/air-build-api.sh"
  bin = ".air/server"
  full_bin = ".air/server"
  include_ext = ["go", "tpl", "tmpl", "html", "tsx", "ts"]
  # exclude_dir only matches root-relative paths (not recursively by
  # basename), so node_modules/dist-ts have to be spelled out per parent —
  # otherwise air walks + watches every file under them.
  exclude_dir  = ["assets", "tmp", ".air", "vendor", "testdata", "docs", "web",
                   "email-templates/node_modules", "email-templates/dist-ts"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  log = ".air/build.log"
  delay = 1000          # ms
  stop_on_error = true
  send_interrupt = false
  kill_delay = "0s"

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[log]
  time = false

[misc]
  clean_on_exit = true
