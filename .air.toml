# .air.toml — hot reload config (https://github.com/air-verse/air)

root = "."
tmp_dir = ".air"

[build]
  cmd = "go build -o .air/server ./apps/api"
  bin = ".air/server"
  full_bin = ".air/server"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir  = ["assets", "tmp", ".air", "vendor", "testdata", "docs"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  log = ".air/build.log"
  delay = 1000          # ms
  stop_on_error = true
  send_interrupt = false
  kill_delay = "0s"

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[log]
  time = false

[misc]
  clean_on_exit = true
