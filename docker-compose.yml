version: "3.9"

services:

  # ── Application ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bread-go-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    # env_file supplies optional overrides (API keys, secrets, etc.)
    # Environment block below ALWAYS wins — sets service-name URIs.
    env_file:
      - path: .env
        required: false          # don't fail if .env doesn't exist yet
    environment:
      # ── Service discovery (must use Docker service names inside the network) ─
      MONGO_URI: "mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&serverSelectionTimeoutMS=5000"
      MONGO_DB_NAME: "bread_boilerplate"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      # ── App identity ──────────────────────────────────────────────────────────
      APP_ENV: "development"
      APP_PORT: "3000"
      # ── JWT key paths (mounted from host via volume below) ────────────────────
      JWT_ACCESS_PRIVATE_KEY_PATH:  "/app/keys/access_private.pem"
      JWT_ACCESS_PUBLIC_KEY_PATH:   "/app/keys/access_public.pem"
      JWT_REFRESH_PRIVATE_KEY_PATH: "/app/keys/refresh_private.pem"
      JWT_REFRESH_PUBLIC_KEY_PATH:  "/app/keys/refresh_public.pem"
      # ── WebAuthn ──────────────────────────────────────────────────────────────
      WEBAUTHN_RP_ID:     "localhost"
      WEBAUTHN_RP_ORIGIN: "http://localhost:3000"
      WEBAUTHN_RP_NAME:   "Bread Boilerplate"
      # ── i18n ──────────────────────────────────────────────────────────────────
      LOCALES_DIR: "/app/locales"
      DEFAULT_LANG: "en"
      # ── Rate limiting ─────────────────────────────────────────────────────────
      RATE_LIMIT_REQUESTS: "100"
      RATE_LIMIT_PERIOD:   "1m"
    volumes:
      - ./keys:/app/keys:ro
      - ./locales:/app/locales:ro
    depends_on:
      mongo1:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - bread-net

  # ── MongoDB Replica Set ────────────────────────────────────────────────────────
  mongo1:
    image: mongo:8.0
    container_name: bread-mongo1
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bread-net

  mongo2:
    image: mongo:8.0
    container_name: bread-mongo2
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo2-data:/data/db
    networks:
      - bread-net

  mongo3:
    image: mongo:8.0
    container_name: bread-mongo3
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo3-data:/data/db
    networks:
      - bread-net

  # Initialises the replica set once — idempotent
  mongo-init:
    image: mongo:8.0
    container_name: bread-mongo-init
    restart: "no"
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_started
      mongo3:
        condition: service_started
    command: >
      mongosh --host mongo1:27017 --eval
      'try {
        rs.status();
        print("Replica set already initialised");
      } catch(e) {
        rs.initiate({
          _id: "rs0",
          members: [
            { _id: 0, host: "mongo1:27017", priority: 2 },
            { _id: 1, host: "mongo2:27017", priority: 1 },
            { _id: 2, host: "mongo3:27017", priority: 1 }
          ]
        });
        print("Replica set initialised");
      }'
    networks:
      - bread-net

  # ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:8.0-alpine
    container_name: bread-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - bread-net

  # ── RabbitMQ (queue backend — profile: rabbitmq) ───────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bread-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - bread-net
    profiles:
      - rabbitmq

  # ── Kafka (queue backend — profile: kafka, KRaft single-node, no ZooKeeper) ────
  kafka:
    image: bitnami/kafka:3.7
    container_name: bread-kafka
    restart: unless-stopped
    ports:
      - "9094:9094"    # EXTERNAL listener for host clients → localhost:9094
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - bread-net
    profiles:
      - kafka

  # ── Background worker — Redis / Asynq (profile: worker) ────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: bread-go-worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MONGO_URI:    "mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0"
      MONGO_DB_NAME: "bread_boilerplate"
      REDIS_HOST:   "redis"
      REDIS_PORT:   "6379"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      redis:
        condition: service_healthy
      mongo1:
        condition: service_healthy
    networks:
      - bread-net
    profiles:
      - worker

  # ── Background worker — RabbitMQ (profile: rabbitmq) ───────────────────────────
  worker-rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        WORKER_CMD: ./apps/worker-rabbitmq
    container_name: bread-go-worker-rabbitmq
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MONGO_URI:     "mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0"
      MONGO_DB_NAME: "bread_boilerplate"
      RABBITMQ_URL:  "amqp://guest:guest@rabbitmq:5672/"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo1:
        condition: service_healthy
    networks:
      - bread-net
    profiles:
      - rabbitmq

  # ── Background worker — Kafka (profile: kafka) ─────────────────────────────────
  worker-kafka:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        WORKER_CMD: ./apps/worker-kafka
    container_name: bread-go-worker-kafka
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MONGO_URI:     "mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0"
      MONGO_DB_NAME: "bread_boilerplate"
      KAFKA_BROKERS: "kafka:9092"
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      kafka:
        condition: service_healthy
      mongo1:
        condition: service_healthy
    networks:
      - bread-net
    profiles:
      - kafka

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  redis-data:
  rabbitmq-data:
  kafka-data:

networks:
  bread-net:
    driver: bridge
