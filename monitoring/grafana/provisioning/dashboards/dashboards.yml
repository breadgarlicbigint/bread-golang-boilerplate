# Auto-loads every dashboard JSON in monitoring/grafana/dashboards/ on
# Grafana startup — no manual import needed.
apiVersion: 1

providers:
  - name: bread-api
    orgId: 1
    folder: "Bread API"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
