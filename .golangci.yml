run:
  timeout: 5m
  go: "1.23"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - gosec
    - bodyclose
    - noctx
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/breadgarlicbigint/bread-golang-boilerplate
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: package-comments
  gosec:
    excludes:
      - G401  # MD5 (not used for security)
      - G501

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck
    - path: "scripts/"
      linters:
        - gosec
